<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Szczegóły dostawy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@700;800&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="topbar">
  <div class="topbar-brand"><strong>📦 Dostawy Mebli</strong></div>
  <button class="btn-logout" onclick="logout()">Wyloguj</button>
</div>

<main>
  <div class="page-header">
    <a href="browse.html" class="back-link" aria-label="Wróć do listy">←</a>
    <h1>Szczegóły dostawy</h1>
  </div>

  <div id="content">
    <div class="loading">Wczytywanie...</div>
  </div>

  <div id="print-section" class="print-only"></div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="auth.js"></script>
<script>
  requireLogin();

  const params = new URLSearchParams(window.location.search);
  const id = params.get("id");
  const content = document.getElementById("content");

  function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str || "";
    return div.innerHTML;
  }

  async function loadDelivery() {
    if (!id) {
      content.innerHTML = `<div class="status-msg">Nie znaleziono dostawy.</div>`;
      return;
    }

    const { data, error } = await supabaseClient
      .from("deliveries")
      .select("*")
      .eq("id", id)
      .single();

    if (error || !data) {
      content.innerHTML = `<div class="status-msg">Nie znaleziono dostawy.</div>`;
      return;
    }

    const mapsUrl = "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(data.address);
    const dateStr = new Date(data.created_at).toLocaleString("pl-PL");

    content.innerHTML = `
      <div class="detail-card">
        <div class="detail-row">
          <div class="field-label">Nazwa asortymentu</div>
          <div class="value">${escapeHtml(data.item_name)}</div>
        </div>
        <div class="detail-row">
          <div class="field-label">Adres dostawy</div>
          <div class="value">
            <a class="maps-link" href="${mapsUrl}" target="_blank" rel="noopener">📍 ${escapeHtml(data.address)}</a>
          </div>
        </div>
        <div class="detail-row">
          <div class="field-label">Numer telefonu</div>
          <div class="value"><a class="tel-link" href="tel:${escapeHtml(data.phone)}">${escapeHtml(data.phone)}</a></div>
        </div>
        ${data.phone2 ? `
        <div class="detail-row">
          <div class="field-label">Numer telefonu 2</div>
          <div class="value"><a class="tel-link" href="tel:${escapeHtml(data.phone2)}">${escapeHtml(data.phone2)}</a></div>
        </div>` : ""}
        <div class="detail-row">
          <div class="field-label">Płatność</div>
          <div class="value">${escapeHtml(data.payment)}</div>
        </div>
        <div class="detail-row">
          <div class="field-label">Wartość</div>
          <div class="value">${escapeHtml(data.value) || "—"} zł</div>
        </div>
        <div class="detail-row">
          <div class="field-label">Cena transportu + wniesienie</div>
          <div class="value">${escapeHtml(data.transport_price) || "—"} zł</div>
        </div>
        <div class="detail-row">
          <div class="field-label">Łączna kwota do zapłaty</div>
          <div class="value total-highlight">${escapeHtml(data.total_amount) || "—"} zł</div>
        </div>
        <div class="detail-row">
          <div class="field-label">Zadatek</div>
          <div class="value">${escapeHtml(data.deposit) || "—"} zł</div>
        </div>
        <div class="detail-row">
          <div class="field-label">Dopłata (pozostało do zapłaty)</div>
          <div class="value total-highlight">${escapeHtml(data.surcharge) || "—"} zł</div>
        </div>
        <div class="detail-row">
          <div class="field-label">Piętro</div>
          <div class="value">${escapeHtml(data.floor) || "—"}</div>
        </div>
        <div class="detail-row">
          <div class="field-label">Wniesienie</div>
          <div class="value">${escapeHtml(data.carry_in) || "—"}</div>
        </div>
        <div class="detail-row">
          <div class="field-label">Montaż</div>
          <div class="value">${escapeHtml(data.assembly) || "—"}</div>
        </div>
        ${data.photo_url ? `
        <div class="detail-row">
          <div class="field-label">Zdjęcie</div>
          <img class="detail-photo" src="${data.photo_url}" alt="Zdjęcie dostawy">
        </div>` : ""}
        <div class="detail-row">
          <div class="field-label">Dodano</div>
          <div class="value mono">${dateStr}</div>
        </div>
      </div>

      <div class="actions-row">
        <a href="edit.html?id=${data.id}" class="btn btn-primary">Edytuj</a>
        <button class="btn btn-amber" id="print-btn">🖨️ Drukuj dla klienta</button>
        <button class="btn btn-danger" id="delete-btn">Usuń dostawę</button>
        <a href="browse.html" class="btn btn-ghost">Powrót do listy</a>
      </div>
    `;

    buildPrintSection(data, dateStr);

    document.getElementById("print-btn").addEventListener("click", () => {
      window.print();
    });

    document.getElementById("delete-btn").addEventListener("click", async () => {
      if (!confirm("Na pewno usunąć tę dostawę? Tej operacji nie można cofnąć.")) return;
      const { error: delError } = await supabaseClient.from("deliveries").delete().eq("id", id);
      if (delError) {
        alert("Błąd usuwania: " + delError.message);
        return;
      }
      window.location.href = "browse.html";
    });
  }

  function buildPrintSection(data, dateStr) {
    const printEl = document.getElementById("print-section");
    printEl.innerHTML = `
      <div class="print-doc">
        <div class="print-header">
          <h2>Potwierdzenie dostawy</h2>
          <div class="print-date">Data wystawienia: ${dateStr}</div>
        </div>

        <table class="print-table">
          <tr><td>Nazwa asortymentu</td><td>${escapeHtml(data.item_name)}</td></tr>
          <tr><td>Adres dostawy</td><td>${escapeHtml(data.address)}</td></tr>
          <tr><td>Numer telefonu</td><td>${escapeHtml(data.phone)}${data.phone2 ? " / " + escapeHtml(data.phone2) : ""}</td></tr>
          <tr><td>Piętro</td><td>${escapeHtml(data.floor) || "—"}</td></tr>
          <tr><td>Wniesienie</td><td>${escapeHtml(data.carry_in) || "—"}</td></tr>
          <tr><td>Montaż</td><td>${escapeHtml(data.assembly) || "—"}</td></tr>
          <tr><td>Płatność</td><td>${escapeHtml(data.payment)}</td></tr>
          <tr><td>Wartość</td><td>${escapeHtml(data.value) || "—"} zł</td></tr>
          <tr><td>Cena transportu + wniesienie</td><td>${escapeHtml(data.transport_price) || "—"} zł</td></tr>
          <tr class="print-total-row"><td>Łączna kwota do zapłaty</td><td>${escapeHtml(data.total_amount) || "—"} zł</td></tr>
          <tr><td>Zadatek</td><td>${escapeHtml(data.deposit) || "—"} zł</td></tr>
          <tr class="print-total-row"><td>Dopłata (pozostało do zapłaty)</td><td>${escapeHtml(data.surcharge) || "—"} zł</td></tr>
        </table>

        <div class="print-stamp-row">
          <div class="print-stamp-box">
            <span>Miejsce na pieczątkę i podpis</span>
          </div>
        </div>
      </div>
    `;
  }

  loadDelivery();
</script>
</body>
</html>
