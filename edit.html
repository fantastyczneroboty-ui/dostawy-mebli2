<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edytuj dostawę</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@700;800&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="topbar">
  <div class="topbar-brand"><strong>📦 Dostawy Mebli</strong></div>
  <a href="home.html" class="topbar-start-btn">Start</a>
  <button class="btn-logout" onclick="logout()">Wyloguj</button>
</div>

<main>
  <div class="page-header">
    <a href="#" id="back-link" class="back-link" aria-label="Wróć">←</a>
    <h1>Edytuj dostawę</h1>
  </div>

  <div id="loading" class="loading">Wczytywanie...</div>

  <form id="edit-form" style="display:none;">
    <div class="field">
      <label class="field-label" for="item_name">Nazwa asortymentu</label>
      <input type="text" id="item_name" required>
    </div>

    <div class="field">
      <label class="field-label" for="address">Adres dostawy</label>
      <input type="text" id="address" required>
    </div>

    <div class="field">
      <label class="field-label" for="phone">Numer telefonu</label>
      <input type="tel" id="phone" required>
    </div>

    <div class="field">
      <label class="field-label" for="phone2">Numer telefonu 2 (opcjonalnie)</label>
      <input type="tel" id="phone2">
    </div>

    <div class="field">
      <label class="field-label" for="value">Wartość (zł)</label>
      <input type="number" step="0.01" id="value">
    </div>

    <div class="field">
      <label class="field-label" for="transport_price">Cena transportu + wniesienie (zł)</label>
      <input type="number" step="0.01" id="transport_price">
    </div>

    <div class="field">
      <label class="field-label">Łączna kwota do zapłaty</label>
      <div class="computed-total" id="total_display">0,00 zł</div>
    </div>

    <div class="field">
      <label class="field-label" for="deposit">Zadatek (zł)</label>
      <input type="number" step="0.01" id="deposit">
    </div>

    <div class="field">
      <label class="field-label">Dopłata (pozostało do zapłaty)</label>
      <div class="computed-total" id="surcharge_display">0,00 zł</div>
    </div>

    <div class="field">
      <label class="field-label" for="payment">Płatność</label>
      <select id="payment" required>
        <option value="Gotówka">Gotówka</option>
        <option value="Płatność kartą">Płatność kartą</option>
      </select>
    </div>

    <div class="field">
      <label class="field-label" for="floor">Piętro</label>
      <select id="floor" required>
        <option value="Parter">Parter</option>
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
        <option value="5">5</option>
        <option value="6+">6 i więcej</option>
      </select>
    </div>

    <div class="field">
      <label class="field-label" for="carry_in">Wniesienie</label>
      <select id="carry_in" required>
        <option value="Nie">Nie</option>
        <option value="Tak">Tak</option>
      </select>
    </div>

    <div class="field">
      <label class="field-label" for="assembly">Montaż</label>
      <select id="assembly" required>
        <option value="Nie">Nie</option>
        <option value="Tak">Tak</option>
      </select>
    </div>

    <div class="field">
      <label class="field-label" for="photo">Zamień zdjęcie (opcjonalnie)</label>
      <input type="file" id="photo" accept="image/*">
      <img id="photo-preview" class="photo-preview">
    </div>

    <div class="error-msg" id="error-msg"></div>

    <div class="actions-row">
      <button type="submit" class="btn btn-amber" id="submit-btn">Zapisz zmiany</button>
      <a href="#" id="cancel-link" class="btn btn-ghost">Anuluj</a>
    </div>
  </form>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="auth.js"></script>
<script>
  requireLogin();

  const params = new URLSearchParams(window.location.search);
  const id = params.get("id");
  document.getElementById("back-link").href = `delivery.html?id=${id}`;
  document.getElementById("cancel-link").href = `delivery.html?id=${id}`;

  const loadingEl = document.getElementById("loading");
  const formEl = document.getElementById("edit-form");
  const errorMsg = document.getElementById("error-msg");
  const submitBtn = document.getElementById("submit-btn");
  const photoInput = document.getElementById("photo");
  const photoPreview = document.getElementById("photo-preview");
  const valueInput = document.getElementById("value");
  const transportInput = document.getElementById("transport_price");
  const totalDisplay = document.getElementById("total_display");
  const depositInput = document.getElementById("deposit");
  const surchargeDisplay = document.getElementById("surcharge_display");

  function calcTotal() {
    const v = parseFloat(valueInput.value) || 0;
    const t = parseFloat(transportInput.value) || 0;
    return v + t;
  }

  function calcSurcharge() {
    const d = parseFloat(depositInput.value) || 0;
    return calcTotal() - d;
  }

  function updateTotalDisplay() {
    totalDisplay.textContent = calcTotal().toFixed(2).replace(".", ",") + " zł";
    surchargeDisplay.textContent = calcSurcharge().toFixed(2).replace(".", ",") + " zł";
  }

  valueInput.addEventListener("input", updateTotalDisplay);
  transportInput.addEventListener("input", updateTotalDisplay);
  depositInput.addEventListener("input", updateTotalDisplay);

  let currentPhotoUrl = null;

  photoInput.addEventListener("change", () => {
    const file = photoInput.files[0];
    if (file) {
      photoPreview.src = URL.createObjectURL(file);
      photoPreview.style.display = "block";
    }
  });

  async function loadDelivery() {
    if (!id) {
      loadingEl.textContent = "Nie znaleziono dostawy.";
      return;
    }
    const { data, error } = await supabaseClient
      .from("deliveries")
      .select("*")
      .eq("id", id)
      .single();

    if (error || !data) {
      loadingEl.textContent = "Nie znaleziono dostawy.";
      return;
    }

    document.getElementById("item_name").value = data.item_name || "";
    document.getElementById("address").value = data.address || "";
    document.getElementById("phone").value = data.phone || "";
    document.getElementById("phone2").value = data.phone2 || "";
    document.getElementById("payment").value = data.payment || "Gotówka";
    document.getElementById("value").value = data.value || "";
    document.getElementById("transport_price").value = data.transport_price || "";
    document.getElementById("floor").value = data.floor || "Parter";
    document.getElementById("deposit").value = data.deposit || "";
    document.getElementById("carry_in").value = data.carry_in || "Nie";
    document.getElementById("assembly").value = data.assembly || "Nie";
    updateTotalDisplay();
    currentPhotoUrl = data.photo_url;
    if (currentPhotoUrl) {
      photoPreview.src = currentPhotoUrl;
      photoPreview.style.display = "block";
    }

    loadingEl.style.display = "none";
    formEl.style.display = "block";
  }

  formEl.addEventListener("submit", async (e) => {
    e.preventDefault();
    errorMsg.textContent = "";
    submitBtn.disabled = true;
    submitBtn.textContent = "Zapisywanie...";

    try {
      let photoUrl = currentPhotoUrl;
      const file = photoInput.files[0];

      if (file) {
        const fileExt = file.name.split(".").pop();
        const filePath = `${Date.now()}-${Math.random().toString(36).slice(2)}.${fileExt}`;

        const { error: uploadError } = await supabaseClient
          .storage
          .from(PHOTOS_BUCKET)
          .upload(filePath, file);

        if (uploadError) throw uploadError;

        const { data: publicUrlData } = supabaseClient
          .storage
          .from(PHOTOS_BUCKET)
          .getPublicUrl(filePath);

        photoUrl = publicUrlData.publicUrl;
      }

      const { error: updateError } = await supabaseClient
        .from("deliveries")
        .update({
          item_name: document.getElementById("item_name").value.trim(),
          address: document.getElementById("address").value.trim(),
          phone: document.getElementById("phone").value.trim(),
          phone2: document.getElementById("phone2").value.trim(),
          payment: document.getElementById("payment").value,
          value: document.getElementById("value").value.trim(),
          transport_price: document.getElementById("transport_price").value.trim(),
          total_amount: calcTotal().toFixed(2),
          floor: document.getElementById("floor").value,
          deposit: document.getElementById("deposit").value.trim(),
          surcharge: calcSurcharge().toFixed(2),
          carry_in: document.getElementById("carry_in").value,
          assembly: document.getElementById("assembly").value,
          photo_url: photoUrl
        })
        .eq("id", id);

      if (updateError) throw updateError;

      window.location.href = `delivery.html?id=${id}`;
    } catch (err) {
      console.error(err);
      errorMsg.textContent = "Błąd zapisu: " + (err.message || "spróbuj ponownie.");
      submitBtn.disabled = false;
      submitBtn.textContent = "Zapisz zmiany";
    }
  });

  loadDelivery();
</script>
</body>
</html>
